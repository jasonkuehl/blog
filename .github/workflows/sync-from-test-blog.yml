name: Sync from test-blog
on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch or tag from jasonkuehl/test-blog to sync"
        required: false
        default: "master"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout blog
        uses: actions/checkout@v4
        with:
          path: blog

      - name: Resolve source ref
        id: source
        env:
          INPUT_SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          if [ -n "$INPUT_SOURCE_REF" ]; then
            echo "ref=$INPUT_SOURCE_REF" >> "$GITHUB_OUTPUT"
          else
            DEFAULT_BRANCH=$(git ls-remote --symref https://github.com/jasonkuehl/test-blog.git HEAD | awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}')
            echo "ref=${DEFAULT_BRANCH:-master}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone test-blog (public HTTPS clone)
        env:
          SOURCE_REF: ${{ steps.source.outputs.ref }}
        run: |
          git clone --depth 1 --branch "$SOURCE_REF" https://github.com/jasonkuehl/test-blog.git test-blog

      - name: Sync template files from test-blog
        run: |
          # Keep this workflow file in blog even when syncing workflow directory.
          rsync -av --delete \
            --exclude 'sync-from-test-blog.yml' \
            --exclude 'sync-to-blog.yml' \
            test-blog/.github/workflows/ blog/.github/workflows/

          # Hugo theme starter assets and static template files.
          rsync -av --delete test-blog/assets/ blog/assets/
          rsync -av --delete test-blog/static/ blog/static/

          rsync -av --delete test-blog/layouts/ blog/layouts/

          cp test-blog/go.mod blog/go.mod
          cp test-blog/go.sum blog/go.sum

          # Sync template config files but keep site-specific config.toml in blog.
          rsync -av --delete \
            --exclude 'config.toml' \
            test-blog/config/_default/ blog/config/_default/

      - name: Safety check (content must not change)
        run: |
          if git -C blog diff --name-only | grep -q '^content/'; then
            echo "Error: content/ changes detected. Aborting sync to protect blog posts."
            git -C blog diff --name-only | grep '^content/' || true
            exit 1
          fi

      - name: Create pull request in blog
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          path: blog
          commit-message: "sync: apply template changes from test-blog"
          branch: sync/template-changes
          delete-branch: true
          title: "Sync template changes from test-blog"
          body: |
            Manual sync of template changes from [jasonkuehl/test-blog](https://github.com/jasonkuehl/test-blog).

            Source ref: `${{ steps.source.outputs.ref }}`

            Synced paths:
            - `.github/workflows/` (excluding sync workflows)
            - `assets/`
            - `static/`
            - `layouts/`
            - `go.mod` and `go.sum`
            - `config/_default/` (excluding `config.toml`)

            Not synced:
            - `content/` (blog posts/pages remain blog-specific)
            - `config/_default/config.toml` (site identity and URL stay blog-specific)
