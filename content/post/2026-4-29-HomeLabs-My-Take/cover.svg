<svg viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#142540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#bgGrad)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <circle cx="200" cy="150" r="180" fill="url(#glowBlue)" opacity="0.3"/>
  <circle cx="1400" cy="450" r="200" fill="url(#glowGreen)" opacity="0.25"/>

  <!-- Network connection lines (background) -->
  <g stroke="#1e40af" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 100 300 Q 400 200 800 300 T 1500 300" stroke-dasharray="4,4"/>
    <path d="M 100 350 Q 400 450 800 350 T 1500 350" stroke-dasharray="4,4"/>
  </g>

  <!-- LEFT SERVER RACK -->
  <g transform="translate(120, 120)">
    <!-- Rack frame -->
    <rect x="0" y="0" width="180" height="380" fill="url(#rackGrad)" stroke="#374151" stroke-width="2" rx="4"/>
    <rect x="-8" y="-8" width="196" height="16" fill="#0f172a" rx="2"/>
    <rect x="-8" y="380" width="196" height="16" fill="#0f172a" rx="2"/>

    <!-- Server units -->
    <g>
      <!-- Server 1 -->
      <rect x="10" y="15" width="160" height="35" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <circle cx="25" cy="32" r="3" fill="#10b981"/>
      <circle cx="38" cy="32" r="3" fill="#10b981"/>
      <rect x="55" y="25" width="40" height="14" fill="#0f172a" rx="1"/>
      <rect x="105" y="25" width="55" height="14" fill="#1e293b" rx="1"/>
      <line x1="110" y1="32" x2="155" y2="32" stroke="#10b981" stroke-width="0.5" opacity="0.6"/>

      <!-- Server 2 -->
      <rect x="10" y="55" width="160" height="35" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <circle cx="25" cy="72" r="3" fill="#10b981"/>
      <circle cx="38" cy="72" r="3" fill="#fbbf24"/>
      <rect x="55" y="65" width="40" height="14" fill="#0f172a" rx="1"/>
      <rect x="105" y="65" width="55" height="14" fill="#1e293b" rx="1"/>

      <!-- Switch (1U) -->
      <rect x="10" y="95" width="160" height="22" fill="#1f2937" stroke="#4b5563" stroke-width="1" rx="2"/>
      <g fill="#10b981">
        <rect x="20" y="103" width="6" height="3"/>
        <rect x="30" y="103" width="6" height="3"/>
        <rect x="40" y="103" width="6" height="3"/>
        <rect x="50" y="103" width="6" height="3"/>
        <rect x="60" y="103" width="6" height="3"/>
        <rect x="70" y="103" width="6" height="3"/>
      </g>
      <g fill="#fbbf24">
        <rect x="80" y="103" width="6" height="3"/>
        <rect x="90" y="103" width="6" height="3"/>
      </g>
      <g fill="#10b981">
        <rect x="100" y="103" width="6" height="3"/>
        <rect x="110" y="103" width="6" height="3"/>
        <rect x="120" y="103" width="6" height="3"/>
        <rect x="130" y="103" width="6" height="3"/>
      </g>

      <!-- Server 3 - 2U -->
      <rect x="10" y="122" width="160" height="55" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <g fill="#0f172a" stroke="#374151">
        <rect x="20" y="135" width="20" height="30" rx="1"/>
        <rect x="45" y="135" width="20" height="30" rx="1"/>
        <rect x="70" y="135" width="20" height="30" rx="1"/>
        <rect x="95" y="135" width="20" height="30" rx="1"/>
        <rect x="120" y="135" width="20" height="30" rx="1"/>
        <rect x="145" y="135" width="20" height="30" rx="1"/>
      </g>
      <circle cx="30" cy="150" r="1.5" fill="#10b981"/>
      <circle cx="55" cy="150" r="1.5" fill="#10b981"/>
      <circle cx="80" cy="150" r="1.5" fill="#10b981"/>
      <circle cx="105" cy="150" r="1.5" fill="#10b981"/>
      <circle cx="130" cy="150" r="1.5" fill="#10b981"/>
      <circle cx="155" cy="150" r="1.5" fill="#fbbf24"/>

      <!-- Server 4 -->
      <rect x="10" y="182" width="160" height="35" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <circle cx="25" cy="199" r="3" fill="#10b981"/>
      <circle cx="38" cy="199" r="3" fill="#10b981"/>
      <rect x="55" y="192" width="40" height="14" fill="#0f172a" rx="1"/>
      <rect x="105" y="192" width="55" height="14" fill="#1e293b" rx="1"/>

      <!-- Firewall -->
      <rect x="10" y="222" width="160" height="28" fill="#1f2937" stroke="#dc2626" stroke-width="1" rx="2"/>
      <text x="20" y="240" font-family="monospace" font-size="9" fill="#f87171" font-weight="bold">PALO ALTO</text>
      <circle cx="155" cy="236" r="3" fill="#dc2626"/>

      <!-- PDU -->
      <rect x="10" y="255" width="160" height="22" fill="#1f2937" stroke="#4b5563" stroke-width="1" rx="2"/>
      <g fill="#3b82f6">
        <rect x="20" y="262" width="4" height="8"/>
        <rect x="30" y="262" width="4" height="8"/>
        <rect x="40" y="262" width="4" height="8"/>
        <rect x="50" y="262" width="4" height="8"/>
        <rect x="60" y="262" width="4" height="8"/>
        <rect x="70" y="262" width="4" height="8"/>
        <rect x="80" y="262" width="4" height="8"/>
        <rect x="90" y="262" width="4" height="8"/>
        <rect x="100" y="262" width="4" height="8"/>
        <rect x="110" y="262" width="4" height="8"/>
      </g>

      <!-- Storage 3U -->
      <rect x="10" y="282" width="160" height="80" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <g fill="#0f172a" stroke="#374151">
        <rect x="18" y="290" width="35" height="20" rx="1"/>
        <rect x="58" y="290" width="35" height="20" rx="1"/>
        <rect x="98" y="290" width="35" height="20" rx="1"/>
        <rect x="138" y="290" width="25" height="20" rx="1"/>
        <rect x="18" y="315" width="35" height="20" rx="1"/>
        <rect x="58" y="315" width="35" height="20" rx="1"/>
        <rect x="98" y="315" width="35" height="20" rx="1"/>
        <rect x="138" y="315" width="25" height="20" rx="1"/>
        <rect x="18" y="340" width="35" height="15" rx="1"/>
        <rect x="58" y="340" width="35" height="15" rx="1"/>
        <rect x="98" y="340" width="35" height="15" rx="1"/>
        <rect x="138" y="340" width="25" height="15" rx="1"/>
      </g>
    </g>
  </g>

  <!-- RIGHT SERVER RACK -->
  <g transform="translate(1300, 120)">
    <rect x="0" y="0" width="180" height="380" fill="url(#rackGrad)" stroke="#374151" stroke-width="2" rx="4"/>
    <rect x="-8" y="-8" width="196" height="16" fill="#0f172a" rx="2"/>
    <rect x="-8" y="380" width="196" height="16" fill="#0f172a" rx="2"/>

    <!-- KVM/Console -->
    <rect x="10" y="15" width="160" height="22" fill="#1f2937" stroke="#4b5563" stroke-width="1" rx="2"/>
    <text x="20" y="30" font-family="monospace" font-size="8" fill="#60a5fa">JetKVM</text>
    <circle cx="155" cy="26" r="3" fill="#3b82f6"/>

    <!-- UniFi switch -->
    <rect x="10" y="42" width="160" height="22" fill="#1f2937" stroke="#06b6d4" stroke-width="1" rx="2"/>
    <text x="20" y="57" font-family="monospace" font-size="8" fill="#22d3ee">UniFi</text>
    <g fill="#22d3ee">
      <rect x="60" y="50" width="4" height="6"/>
      <rect x="68" y="50" width="4" height="6"/>
      <rect x="76" y="50" width="4" height="6"/>
      <rect x="84" y="50" width="4" height="6"/>
      <rect x="92" y="50" width="4" height="6"/>
      <rect x="100" y="50" width="4" height="6"/>
      <rect x="108" y="50" width="4" height="6"/>
      <rect x="116" y="50" width="4" height="6"/>
    </g>

    <!-- Whitebox servers -->
    <g>
      <rect x="10" y="70" width="160" height="50" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <rect x="20" y="80" width="50" height="30" fill="#0f172a" rx="1"/>
      <text x="28" y="99" font-family="monospace" font-size="8" fill="#10b981">PROXMOX</text>
      <circle cx="155" cy="85" r="2" fill="#10b981"/>
      <circle cx="155" cy="95" r="2" fill="#10b981"/>
      <circle cx="155" cy="105" r="2" fill="#10b981"/>

      <rect x="10" y="125" width="160" height="50" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <rect x="20" y="135" width="50" height="30" fill="#0f172a" rx="1"/>
      <text x="28" y="154" font-family="monospace" font-size="8" fill="#10b981">PROXMOX</text>
      <circle cx="155" cy="140" r="2" fill="#10b981"/>
      <circle cx="155" cy="150" r="2" fill="#10b981"/>
      <circle cx="155" cy="160" r="2" fill="#fbbf24"/>

      <rect x="10" y="180" width="160" height="50" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
      <rect x="20" y="190" width="50" height="30" fill="#0f172a" rx="1"/>
      <text x="28" y="209" font-family="monospace" font-size="8" fill="#10b981">PROXMOX</text>
      <circle cx="155" cy="195" r="2" fill="#10b981"/>
      <circle cx="155" cy="205" r="2" fill="#10b981"/>
      <circle cx="155" cy="215" r="2" fill="#10b981"/>
    </g>

    <!-- Cisco router -->
    <rect x="10" y="235" width="160" height="28" fill="#1f2937" stroke="#0ea5e9" stroke-width="1" rx="2"/>
    <text x="20" y="253" font-family="monospace" font-size="9" fill="#38bdf8" font-weight="bold">CISCO</text>
    <circle cx="155" cy="249" r="3" fill="#0ea5e9"/>

    <!-- Backup unit -->
    <rect x="10" y="268" width="160" height="50" fill="url(#serverGrad)" stroke="#4b5563" stroke-width="1" rx="2"/>
    <rect x="20" y="278" width="60" height="30" fill="#0f172a" rx="1"/>
    <text x="28" y="297" font-family="monospace" font-size="8" fill="#a78bfa">BACKUP</text>
    <circle cx="100" cy="293" r="3" fill="#a78bfa"/>

    <!-- PDU -->
    <rect x="10" y="323" width="160" height="22" fill="#1f2937" stroke="#4b5563" stroke-width="1" rx="2"/>
    <g fill="#3b82f6">
      <rect x="20" y="330" width="4" height="8"/>
      <rect x="30" y="330" width="4" height="8"/>
      <rect x="40" y="330" width="4" height="8"/>
      <rect x="50" y="330" width="4" height="8"/>
      <rect x="60" y="330" width="4" height="8"/>
      <rect x="70" y="330" width="4" height="8"/>
      <rect x="80" y="330" width="4" height="8"/>
      <rect x="90" y="330" width="4" height="8"/>
      <rect x="100" y="330" width="4" height="8"/>
      <rect x="110" y="330" width="4" height="8"/>
    </g>

    <rect x="10" y="350" width="160" height="20" fill="#1f2937" stroke="#4b5563" stroke-width="1" rx="2"/>
  </g>

  <!-- Network cables connecting racks -->
  <g fill="none" stroke-width="3" opacity="0.7">
    <path d="M 300 250 Q 600 220 800 240 T 1300 230" stroke="#3b82f6"/>
    <path d="M 300 280 Q 600 310 800 290 T 1300 270" stroke="#10b981"/>
    <path d="M 300 320 Q 600 350 800 340 T 1300 310" stroke="#f59e0b"/>
    <path d="M 300 360 Q 600 380 800 380 T 1300 360" stroke="#ef4444"/>
  </g>

  <!-- Central node / network hub icon -->
  <g transform="translate(800, 300)">
    <circle r="55" fill="#0f172a" stroke="#3b82f6" stroke-width="2" opacity="0.95"/>
    <circle r="55" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4">
      <animate attributeName="r" from="55" to="80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Network/globe icon -->
    <circle r="32" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <ellipse rx="32" ry="14" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <ellipse rx="14" ry="32" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="0" y1="-32" x2="0" y2="32" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <!-- Title text -->
  <g transform="translate(800, 110)" text-anchor="middle">
    <text font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#f1f5f9" letter-spacing="2">
      THE HOME LAB
    </text>
    <text y="42" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="300" fill="#94a3b8" letter-spacing="6">
      CONTROL  ·  LEARN  ·  EXPERIMENT
    </text>
  </g>

  <!-- Bottom tag line -->
  <g transform="translate(800, 510)" text-anchor="middle">
    <text font-family="'Courier New', monospace" font-size="14" fill="#64748b" letter-spacing="3">
      proxmox  /  unifi  /  cisco  /  palo alto  /  whitebox
    </text>
  </g>

  <!-- Decorative corner brackets -->
  <g stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 40 40 L 40 80 M 40 40 L 80 40"/>
    <path d="M 1560 40 L 1560 80 M 1560 40 L 1520 40"/>
    <path d="M 40 560 L 40 520 M 40 560 L 80 560"/>
    <path d="M 1560 560 L 1560 520 M 1560 560 L 1520 560"/>
  </g>

  <!-- Small floating data points -->
  <g fill="#10b981" opacity="0.6">
    <circle cx="450" cy="160" r="2"/>
    <circle cx="550" cy="200" r="2"/>
    <circle cx="650" cy="150" r="2"/>
    <circle cx="950" cy="180" r="2"/>
    <circle cx="1050" cy="220" r="2"/>
    <circle cx="1150" cy="170" r="2"/>
    <circle cx="500" cy="450" r="2"/>
    <circle cx="700" cy="470" r="2"/>
    <circle cx="900" cy="450" r="2"/>
    <circle cx="1100" cy="470" r="2"/>
  </g>
</svg>
